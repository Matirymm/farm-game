workflows:
  android-apk:
    name: Build Android APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Generate Android scaffolding (no local tooling needed)
        script: |
          flutter create . --org com.matirymm.farmgame --project-name farm_game --platforms android
      - name: Get packages
        script: flutter pub get
      - name: Build release APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
